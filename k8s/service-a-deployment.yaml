apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a-deployment
  namespace: sample-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a
  template:
    metadata:
      labels:
        app: service-a
    spec:
      containers:
      - name: service-a
        image: REPLACE_WITH_IMAGE_SERVICE_A
        ports:
        - containerPort: 3000
