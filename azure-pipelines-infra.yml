trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/*

variables:
  # Set this to an Azure Resource Manager service connection name in Azure DevOps
  AZURE_SUBSCRIPTION: 'Azure-Subscription-ServiceConnection'
  # Optional values you can override in pipeline variables
  PREFIX: 'sample'
  LOCATION: 'eastus'

stages:
- stage: TerraformApply
  displayName: Deploy infrastructure (Terraform)
  jobs:
  - job: Apply
    displayName: Terraform Apply
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: TerraformInstaller@0
      displayName: Install Terraform
      inputs:
        terraformVersion: '1.5.7'

    - task: AzureCLI@2
      displayName: 'Run Terraform (init/plan/apply)'
      inputs:
        azureSubscription: '$(AZURE_SUBSCRIPTION)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          set -euo pipefail
          cd infra
          echo "Initializing Terraform..."
          terraform init

          echo "Planning Terraform..."
          terraform plan -out=tfplan \
            -var "prefix=$(PREFIX)" \
            -var "location=$(LOCATION)" \
            -var "ssh_public_key=$(SSH_PUBLIC_KEY)"

          echo "Applying Terraform..."
          terraform apply -input=false -auto-approve tfplan
      env:
        # SSH_PUBLIC_KEY should be created as a pipeline variable (secure) in Azure DevOps
        SSH_PUBLIC_KEY: $(SSH_PUBLIC_KEY)
